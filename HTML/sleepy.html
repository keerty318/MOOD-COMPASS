<html lang="en">

<body class="pg-smile" style=" background: linear-gradient(

  ); ">
    <div class="total">
        <div class="logo-heading">
            <h2>🧭Mood Compass</h2>
        </div>
        <div class="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="journal.html">📝Journal</a></li>

            <h2 style="color: #2b2f9b;">You're feeling tired</h2>

            <div class="buttons">

                </div>

    <script>
        function selectMood() {
            localStorage.setItem("selectedMood", JSON.stringify({
                emoji: "😴",
                mood: "Tired",
                date: new Date().toISOString().split("T")[0]
            }));
            window.location.href = "journal.html";
        }
