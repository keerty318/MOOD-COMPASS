<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Compass</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">


</head>

<body class="pg-smile" style=" background: linear-gradient(
    135deg,
    #dbe8ff,
    #e6ebff
  );">
    <div class="total">
        <div class="logo-heading">
            <h2>🧭Mood Compass</h2>
        </div>
        <div class="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="journal.html">📝Journal</a></li>
                <li><a href="breathe.html">🫁Breathe</a></li>
                <li><a href="history.html">📊History</a></li>
                <li><a href="tips.html">💡Tips</a></li>
            </ul>

        </div>
    </div>
    <section class="mood-happy">
        <div class="mood-card" style="  background-color: #f1f4ff;box-shadow: 0 25px 50px rgba(0,0,0,0.15);">
            <div class="emoji">😔</div>
            <h2 style="color: #1f3fb8;">You're feeling sad</h2>
            <p>"It's okay to feel sad. These emotions are part of being human."</p>
            <div class="buttons">
                <div class="btn-top">
                    <a href="tips.html"><button class="btns">Get Suggestions</button></a>
                    <a href="breathe.html"><button class="btns">Breathing Excercise</button></a>
                </div>
                <div class="btn-btm">
                    <button class="btns" onclick="selectMood()">Pen Down Your Thoughts</button>

                </div>





            </div>

        </div>
    </section>
    <script>
        function selectMood() {
            const moodData = {
                emoji: "😔",
                mood: "Sad",
                date: new Date().toISOString().split("T")[0]
            };

            localStorage.setItem("selectedMood", JSON.stringify(moodData));
            window.location.href = "journal.html";
        }
    </script>

</body>

</html>
