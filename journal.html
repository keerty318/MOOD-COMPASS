<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Compass</title>
   <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body class="pg-journal">
    <div class="total">
        <div class="logo-heading">
            <h2>🧭Mood Compass</h2>
        </div>
        <div class="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="journal.html">📝Journal</a></li>
                <li><a href="breathe.html">🫁Breathe</a></li>
                <li><a href="history.html">📊History</a></li>
                <li><a href="tips.html">💡Tips</a></li>
            </ul>

        </div>
    </div>
    <div class="journal">
        <div class="headings">
            <h1>Your Mood Journal</h1>
            <p style=" color: #6b7280;">Express yourself freely. Your thoughts are safe here.</p>
        </div>
        <div class="entry-box" style="text-align: center;">
            <textarea id="journalText" placeholder="Write what's on your mind..."></textarea>

            <div class="entry-box-bg">
                <button onclick="saveEntry()">Save Entry</button>
            </div>

           
        </div>


    </div>
    <script>
        function saveEntry() {
            const journalText = document.getElementById("journalText").value.trim();
            const selectedMood = JSON.parse(localStorage.getItem("selectedMood"));

            if (!selectedMood) {
                alert("Select a mood first");
                return;
            }

            if (journalText === "") {
                alert("Write something");
                return;
            }

            const now = new Date();
            const entry = {
                date: now.toISOString().split("T")[0],
                time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                mood: selectedMood.mood,
                emoji: selectedMood.emoji,
                journal: journalText
            };

            let moodHistory = JSON.parse(localStorage.getItem("moodHistory")) || [];
            moodHistory.push(entry);

            localStorage.setItem("moodHistory", JSON.stringify(moodHistory));
            localStorage.removeItem("selectedMood");

            alert("Saved ❤️");
            document.getElementById("journalText").value = "";
        }
    </script>

</body>

</html>
